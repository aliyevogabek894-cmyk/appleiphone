<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Store Navigation</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f5f5f7; margin: 0; }
        .container { text-align: center; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: #1d1d1f; margin-bottom: 30px; }
        .btn { display: inline-block; padding: 15px 30px; margin: 10px; border-radius: 980px; text-decoration: none; font-weight: 600; font-size: 16px; transition: all 0.3s; }
        .btn-user { background: #0071e3; color: white; }
        .btn-user:hover { background: #0077ED; transform: scale(1.05); }
        .btn-admin { background: #1d1d1f; color: white; }
        .btn-admin:hover { background: #000; transform: scale(1.05); }
    .btn-shop { background: #ff9500; color: white; } .btn-shop:hover { background: #e08300; transform: scale(1.05); }</style>
</head>
<body>
    <div class="container">
        <h1>Apple Store Project</h1>
        <p style="margin-bottom: 30px; color: #86868b;">Select which portal you want to view:</p>
        <a href="store/index.html" class="btn btn-store" style="background: #0071e3; color: white;">Go to Official Store (1:1)</a>
        <a href="shop/index.html" class="btn btn-shop">Go to Buy Page (1:1 Exact)</a>
        <a href="user/index.html" class="btn btn-user" style="background: #86868b; color: white;">View Old Clone</a>
        <a href="admin/index.html" class="btn btn-admin">Admin Dashboard</a>
    </div>
</body>
</html>
